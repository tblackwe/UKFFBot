AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'UKFF Slack Bot - Serverless Infrastructure'

Parameters:
  SlackBotToken:
    Type: String
    NoEcho: true
    Description: Slack Bot User OAuth Token
  
  SlackSigningSecret:
    Type: String
    NoEcho: true
    Description: Slack App Signing Secret
  
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment name

  AlarmEmail:
    Type: String
    Default: ''
    Description: Optional email address to subscribe to Lambda error alarms (leave blank to skip)

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        SLACK_BOT_TOKEN: !Ref SlackBotToken
        SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
        DYNAMODB_TABLE_NAME: !Ref UKFFBotTable
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1

Resources:
  # DynamoDB Table for storing bot data
  UKFFBotTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'UKFFBot-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: slackChannelId
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      # Index channel-scoped lookups (drafts and leagues) so they Query by
      # slackChannelId + item type (PK) instead of scanning the whole table.
      GlobalSecondaryIndexes:
        - IndexName: SlackChannelIndex
          KeySchema:
            - AttributeName: slackChannelId
              KeyType: HASH
            - AttributeName: PK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      # Auto-expire items carrying a `ttl` epoch attribute (e.g. event dedup records).
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Application
          Value: UKFFBot
        - Key: Environment
          Value: !Ref Environment

  # Main Slack Bot Lambda Function
  SlackBotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ukff-slack-bot-${Environment}'
      CodeUri: ./
      Handler: lambda-handler.handler
      Description: 'UKFF Slack Bot for Fantasy Football Draft Management'
      # More memory (and proportional CPU) keeps cold-start init within the
      # interactive Slack request budget. The scheduled functions inherit 256.
      MemorySize: 512
      Environment:
        Variables:
          NODE_ENV: production
      Events:
        SlackEvents:
          Type: Api
          Properties:
            RestApiId: !Ref SlackBotApi
            Path: /slack/events
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UKFFBotTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # Draft Monitor Lambda Function
  DraftMonitorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ukff-draft-monitor-${Environment}'
      CodeUri: ./
      Handler: lambda-draft-monitor.handler
      Description: 'UKFF Draft Monitor - Checks for new draft picks periodically'
      Timeout: 60
      Environment:
        Variables:
          NODE_ENV: production
      Events:
        DraftMonitorSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: 'Check for new draft picks every minute'
            Enabled: true
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UKFFBotTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # Roster Scheduler Lambda Function
  RosterSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ukff-roster-scheduler-${Environment}'
      CodeUri: ./
      Handler: lambda-roster-scheduler.handler
      Description: 'UKFF Roster Scheduler - Automatically checks rosters on scheduled days'
      Timeout: 300
      Environment:
        Variables:
          NODE_ENV: production
      Events:
        # Thursday at 5 PM (17:00 PM UTC)
        ThursdayNoonSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 17 ? * THU *)
            Description: 'Check rosters every Thursday at 5 PM'
            Enabled: true
        # Sunday at 11 AM (11:00 AM UTC)
        SundayMorningSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 11 ? * SUN *)
            Description: 'Check rosters every Sunday at 11 AM'
            Enabled: true
        # Monday at 5 PM (17:00 PM UTC)
        MondayNoonSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 17 ? * MON *)
            Description: 'Check rosters every Monday at 5 PM'
            Enabled: true
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UKFFBotTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # API Gateway for Slack Events
  SlackBotApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'ukff-slack-bot-api-${Environment}'
      StageName: !Ref Environment
      # No CORS: this is a server-to-server Slack webhook (signature-verified),
      # not a browser-facing API, so CORS headers serve no purpose.
      EndpointConfiguration:
        Type: REGIONAL
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

  # CloudWatch Log Groups
  SlackBotLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/ukff-slack-bot-${Environment}'
      RetentionInDays: 14

  DraftMonitorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/ukff-draft-monitor-${Environment}'
      RetentionInDays: 14

  RosterSchedulerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/ukff-roster-scheduler-${Environment}'
      RetentionInDays: 14

  # CloudWatch Dashboard
  UKFFBotDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'UKFFBot-${Environment}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 8,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${SlackBotFunction}" ],
                  [ ".", "Errors", ".", "." ],
                  [ ".", "Duration", ".", "." ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Slack Bot Lambda Metrics"
              }
            },
            {
              "type": "metric",
              "x": 8,
              "y": 0,
              "width": 8,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${DraftMonitorFunction}" ],
                  [ ".", "Errors", ".", "." ],
                  [ ".", "Duration", ".", "." ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Draft Monitor Lambda Metrics"
              }
            },
            {
              "type": "metric",
              "x": 16,
              "y": 0,
              "width": 8,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${RosterSchedulerFunction}" ],
                  [ ".", "Errors", ".", "." ],
                  [ ".", "Duration", ".", "." ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Roster Scheduler Lambda Metrics"
              }
            }
          ]
        }

  # SNS topic for operational alarms
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'ukff-alarms-${Environment}'
      DisplayName: 'UKFFBot Alarms'

  # Optional email subscription (only created when AlarmEmail is provided)
  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      TopicArn: !Ref AlarmTopic
      Protocol: email
      Endpoint: !Ref AlarmEmail

  # Error alarms — surface Lambda failures that would otherwise only land in logs
  SlackBotErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'ukff-slack-bot-errors-${Environment}'
      AlarmDescription: 'Slack bot Lambda reported one or more errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SlackBotFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  DraftMonitorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'ukff-draft-monitor-errors-${Environment}'
      AlarmDescription: 'Draft monitor Lambda reported one or more errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DraftMonitorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  RosterSchedulerErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'ukff-roster-scheduler-errors-${Environment}'
      AlarmDescription: 'Roster scheduler Lambda reported one or more errors'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref RosterSchedulerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

Outputs:
  SlackBotApiUrl:
    Description: 'API Gateway endpoint URL for Slack events'
    Value: !Sub 'https://${SlackBotApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/slack/events'
    Export:
      Name: !Sub '${AWS::StackName}-SlackBotApiUrl'
  
  DynamoDBTableName:
    Description: 'DynamoDB table name'
    Value: !Ref UKFFBotTable
    Export:
      Name: !Sub '${AWS::StackName}-DynamoDBTableName'
  
  SlackBotFunctionArn:
    Description: 'Slack Bot Lambda Function ARN'
    Value: !GetAtt SlackBotFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SlackBotFunctionArn'
  
  DraftMonitorFunctionArn:
    Description: 'Draft Monitor Lambda Function ARN'
    Value: !GetAtt DraftMonitorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DraftMonitorFunctionArn'

  RosterSchedulerFunctionArn:
    Description: 'Roster Scheduler Lambda Function ARN'
    Value: !GetAtt RosterSchedulerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RosterSchedulerFunctionArn'

  AlarmTopicArn:
    Description: 'SNS topic ARN for operational alarms (subscribe here if no AlarmEmail was set)'
    Value: !Ref AlarmTopic
    Export:
      Name: !Sub '${AWS::StackName}-AlarmTopicArn'
